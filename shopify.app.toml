# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration
# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "df07ee6d17a8b6f7721ef1a4d462e9f4"
application_url = "https://subscription-product-rotation-vamor.vercel.app"
embedded = true
name = "Subscription Product Rotation"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_orders,write_orders,read_order_edits,write_order_edits,read_customers,write_customers,read_products,write_products,read_metaobjects,write_metaobjects,write_metaobject_definitions,read_own_subscription_contracts,write_own_subscription_contracts,read_merchant_managed_fulfillment_orders,write_merchant_managed_fulfillment_orders,write_fulfillments"

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/create"
  topics = [ "orders/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/subscription-contracts/activate"
  topics = [ "subscription_contracts/activate" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/subscription-contracts/cancel"
  topics = [ "subscription_contracts/cancel" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/subscription-contracts/update"
  topics = [ "subscription_contracts/update" ]

[auth]
redirect_urls = [ "https://subscription-product-rotation-vamor.vercel.app/api/auth", 
"https://subscription-product-rotation-vamor.vercel.app/auth/callback",
 "https://subscription-product-rotation-vamor.vercel.app/auth/shopify/callback",
  "https://subscription-product-rotation-vamor.vercel.app/api/auth/callback"
 ]

[build]
automatically_update_urls_on_dev = true
